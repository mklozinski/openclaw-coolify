version: '3.8'

services:
  openclaw:
    build:
      context: .
      args:
        OPENCLAW_NPM_SPEC: ${OPENCLAW_NPM_SPEC:-openclaw@latest}
    image: openclaw-coolify
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      # Config volume - persists openclaw.json and OpenClaw config state.
      - openclaw-config:/home/linuxbrew/.openclaw
      # Workspace volume - persists MEMORY.md, AGENTS.md, memory/, skills, and other workspace files.
      - openclaw-workspace:/home/linuxbrew/.openclaw/workspace
      # Homebrew volume - persists shared tools installed via Homebrew.
      - openclaw-homebrew:/home/linuxbrew/.linuxbrew
      # Pip packages volume - persists pip-installed Python packages and binaries.
      - openclaw-pip:/home/linuxbrew/.local
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-openrouter/google/gemini-3-flash-preview}
      - OPENCLAW_CONFIG_CONTENT=${OPENCLAW_CONFIG_CONTENT}
      # Set to "true" to force-overwrite config from env vars (one-time reset).
      - OPENCLAW_FORCE_CONFIG=${OPENCLAW_FORCE_CONFIG:-false}
      # Optional persistent shared tools, for example: "ffmpeg yt-dlp"
      - OPENCLAW_BREW_PACKAGES=${OPENCLAW_BREW_PACKAGES}
      # Set to "true" to move a stale ~/.local OpenClaw install aside automatically.
      - OPENCLAW_RENAME_STALE_LOCAL_OPENCLAW=${OPENCLAW_RENAME_STALE_LOCAL_OPENCLAW:-false}
      # Telegram user IDs for auto-elevated access. Comma-separated or JSON array.
      # Examples: "123456789,987654321" or '["123456789","987654321"]'
      - OPENCLAW_TELEGRAM_ELEVATED_IDS=${OPENCLAW_TELEGRAM_ELEVATED_IDS}
      # Your domain (without https://), e.g. assistant.project.mydomain.dev
      - OPENCLAW_DOMAIN=${OPENCLAW_DOMAIN}
      - TZ=UTC
    labels:
      - traefik.enable=true
      - coolify.managed=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.services.openclaw.loadbalancer.server.port=18789
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  openclaw-config:
  openclaw-workspace:
  openclaw-homebrew:
  openclaw-pip:
